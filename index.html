<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Net2d · Do estado desejado ao estado operacional</title>
  <meta name="description" content="Apresentação do trabalho de mestrado de Jerônimo Menezes: o ecossistema Net2d para automação observável e reprodutível de redes heterogêneas. Trajetória em seis fases." />
  <meta property="og:title" content="Net2d · Do estado desejado ao estado operacional" />
  <meta property="og:description" content="Ecossistema modular para automação observável e reprodutível de redes heterogêneas. Mestrado de Jerônimo Menezes (UNIPAMPA)." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    /* aplica o tema antes da pintura para evitar flash */
    (function () {
      try {
        var t = localStorage.getItem("net2d-theme");
        if (t !== "light" && t !== "dark") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="index.html"><span class="dot"></span> Net2d</a>
      <nav class="nav">
        <a id="nav-home" href="#top">Início</a>
        <a id="nav-arch" href="#architecture">Arquitetura</a>
        <a id="nav-timeline" href="#timeline">Trajetória</a>
        <a id="nav-product" href="#product">Produto final</a>
      </nav>
      <div class="header-controls">
        <div id="lang-switch" class="lang-switch" aria-label="Idioma"></div>
        <div id="theme-toggle"></div>
      </div>
    </div>
  </header>

  <main id="app"><!-- conteudo renderizado por home.js --></main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span id="footer-text"></span>
      <a id="footer-repos" href="https://github.com/orgs/net2d-community/repositories" target="_blank" rel="noopener">Repositorios</a>
    </div>
    <div class="wrap footer-credit">
      <span id="footer-credit-label"></span>
      <a href="https://ai-horizon-labs.github.io" target="_blank" rel="noopener">AI Horizon Labs</a>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
